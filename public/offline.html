<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Translation Management System</title>
    <link rel="icon" href="/icons/icon-192.png" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f9fafb;
        color: #111827;
        padding: 24px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0b0f14; color: #e5e7eb; }
        .card { background: #111827; border-color: #1f2937; }
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 32px 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,.06);
      }
      img { width: 64px; height: 64px; border-radius: 14px; margin-bottom: 16px; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { margin: 0 0 20px; color: #6b7280; font-size: 14px; line-height: 1.5; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #10b981; color: #fff; font-weight: 600; font-size: 14px;
        padding: 10px 20px; border-radius: 10px;
      }
      button:hover { background: #059669; }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icons/icon-192.png" alt="TMS" />
      <h1>You're offline</h1>
      <p>This page isn't available without a connection. Check your internet and try again — your data is safe and lives on the server.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
